[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Proxy /sentient-trader → sentienttrader.netlify.app (strips the prefix).
# Next.js has no basePath, so it serves at root — we strip /sentient-trader here.
# status=200 = transparent rewrite (URL stays apps.sundeepdayalan.in/sentient-trader/...).
# Must come BEFORE the 404 catch-all.
[[redirects]]
  from   = "/sentient-trader"
  to     = "https://sentienttrader.netlify.app/"
  status = 200
  force  = true

[[redirects]]
  from   = "/sentient-trader/*"
  to     = "https://sentienttrader.netlify.app/:splat"
  status = 200
  force  = true

# Redirect apps subdomain root → /apps hub page.
# force=true required so it overrides the static index.html on the same site.
[[redirects]]
  from        = "/"
  to          = "/apps"
  status      = 302
  force       = true
  conditions  = { Host = ["apps.sundeepdayalan.in"] }

# Catch-all 404 (must stay last)
[[redirects]]
  from = "/*"
  to   = "/404"
  status = 404
